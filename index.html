<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel ="stylesheet" href="style.css">
<body>
    
<h1>Welcome to my website</h1>
    <div class="container">
        <form id="userForm">
            <h3>User Registration</h3>
            <input type="text" id="name" name="name" placeholder="Enter  name"><br><br>
            <input type="number" id="age" name="age" placeholder="Enter age"><br><br>
            <input type="text" id="role" name="role" placeholder="Enter role"><br><br>
            <input type="text" id="email" name="email" placeholder="Enter email"><br><br>
            <input type="text" id="description" name="description" placeholder="Enter description"><br><br>
            <h7>Upload Profile image</h7><br>
            <input type="file" accept="image/*" id="profilePic" placeholder="Upload profile image"><br><br>
            <button type="submit" id="submitBtn" class="submit">Register User</button>
        </form>
    

    
        <form id="adminform">
            <h3>Admin Login</h3>
            <input type="text" id="empid" name="empid" placeholder="Enter Employee id"><br><br>
            <input type="password" id="password" name="password" placeholder="Enter password"><br><br>
            <button type="submit" class="submit">Submit</button><br><br><br>
            <p><b>Note:</b>Kindly Contact your oraganization for admin id and password</p>

        </form>
    </div>

    <div id="cards"><br><br>
        <h3 id="h3">Your Card</h3>
        <input type ="search" id="searchUser" placeholder="search users"style="display:none";><br>
        <h5 id="userCount" ></h5>
        <div id="userCards"></div>


    </div>
    <script src="script.js"></script>
</body>
</html>
